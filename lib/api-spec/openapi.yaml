openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Customer Churn Prediction API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prediction
    description: Churn prediction operations
  - name: dashboard
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /predict:
    post:
      operationId: predictChurn
      tags: [prediction]
      summary: Predict customer churn
      description: Predict whether a customer will churn, with probability and top risk factors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Model not loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      description: Returns summary statistics from the training dataset
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /predictions/history:
    get:
      operationId: getPredictionHistory
      tags: [prediction]
      summary: Get recent prediction history
      description: Returns recent predictions made by the system
      responses:
        "200":
          description: List of recent predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PredictionRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CustomerInput:
      type: object
      required:
        - tenure
        - monthlyCharges
        - totalCharges
        - gender
        - seniorCitizen
        - partner
        - dependents
        - phoneService
        - multipleLines
        - internetService
        - onlineSecurity
        - onlineBackup
        - deviceProtection
        - techSupport
        - streamingTV
        - streamingMovies
        - contract
        - paperlessBilling
        - paymentMethod
      properties:
        tenure:
          type: integer
          minimum: 0
          maximum: 120
        monthlyCharges:
          type: number
          minimum: 0
        totalCharges:
          type: number
          minimum: 0
        gender:
          type: string
          enum: [Male, Female]
        seniorCitizen:
          type: integer
          enum: [0, 1]
        partner:
          type: string
          enum: [Yes, No]
        dependents:
          type: string
          enum: [Yes, No]
        phoneService:
          type: string
          enum: [Yes, No]
        multipleLines:
          type: string
          enum: [Yes, No, "No phone service"]
        internetService:
          type: string
          enum: [DSL, Fiber optic, No]
        onlineSecurity:
          type: string
          enum: [Yes, No, "No internet service"]
        onlineBackup:
          type: string
          enum: [Yes, No, "No internet service"]
        deviceProtection:
          type: string
          enum: [Yes, No, "No internet service"]
        techSupport:
          type: string
          enum: [Yes, No, "No internet service"]
        streamingTV:
          type: string
          enum: [Yes, No, "No internet service"]
        streamingMovies:
          type: string
          enum: [Yes, No, "No internet service"]
        contract:
          type: string
          enum: [Month-to-month, One year, Two year]
        paperlessBilling:
          type: string
          enum: [Yes, No]
        paymentMethod:
          type: string
          enum:
            - Electronic check
            - Mailed check
            - Bank transfer (automatic)
            - Credit card (automatic)

    PredictionResult:
      type: object
      required:
        - prediction
        - probability
        - riskLevel
        - factors
      properties:
        prediction:
          type: string
          enum: [Churn, Stay]
        probability:
          type: number
          minimum: 0
          maximum: 1
        riskLevel:
          type: string
          enum: [Low, Medium, High]
        factors:
          type: array
          items:
            type: string

    PredictionRecord:
      type: object
      required:
        - id
        - timestamp
        - prediction
        - probability
        - riskLevel
      properties:
        id:
          type: integer
        timestamp:
          type: string
          format: date-time
        prediction:
          type: string
        probability:
          type: number
        riskLevel:
          type: string
        tenure:
          type: ["integer", "null"]
        monthlyCharges:
          type: ["number", "null"]
        contract:
          type: ["string", "null"]

    DashboardStats:
      type: object
      required:
        - totalCustomers
        - churnRate
        - avgTenure
        - avgMonthlyCharges
        - highRiskCount
        - contractBreakdown
        - internetServiceBreakdown
      properties:
        totalCustomers:
          type: integer
        churnRate:
          type: number
        avgTenure:
          type: number
        avgMonthlyCharges:
          type: number
        highRiskCount:
          type: integer
        contractBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"
        internetServiceBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"

    BreakdownItem:
      type: object
      required:
        - label
        - count
        - percentage
      properties:
        label:
          type: string
        count:
          type: integer
        percentage:
          type: number

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
