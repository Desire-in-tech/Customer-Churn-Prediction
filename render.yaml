services:
  # ── Django REST API ──────────────────────────────────────────────────────────
  - type: web
    name: churn-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn --workers 2 --bind 0.0.0.0:$PORT wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: churn-api
          property: host
    healthCheckPath: /api/healthz/

  # ── React Static Site ────────────────────────────────────────────────────────
  - type: web
    name: churn-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/frontend run build
    staticPublishPath: artifacts/frontend/dist/public
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: churn-api
          property: url
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
